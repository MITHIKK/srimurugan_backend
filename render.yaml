services:
  - type: web
    name: sri-murugan-booking-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromDatabase:
          name: sri-murugan-mongodb
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PIN
        value: "1234"
    healthCheckPath: /health
    
databases:
  - name: sri-murugan-mongodb
    plan: free
